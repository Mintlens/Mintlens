name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an active deployment

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mintlens/mintlens/api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for Web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mintlens/mintlens/web
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - id: meta
        run: echo "version=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/mintlens

            # Pull latest images
            IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
            export IMAGE_TAG

            echo "🚀 Deploying tag: $IMAGE_TAG"

            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker compose -f docker/docker-compose.prod.yml pull api worker web

            # Zero-downtime rolling update
            docker compose -f docker/docker-compose.prod.yml up -d \
              --no-deps \
              --remove-orphans \
              api worker web

            # Wait for API health check
            echo "⏳ Waiting for API health check..."
            for i in $(seq 1 12); do
              if docker compose -f docker/docker-compose.prod.yml exec -T api wget -qO- http://localhost:3001/health > /dev/null 2>&1; then
                echo "✅ API is healthy"
                break
              fi
              sleep 5
            done

            # Clean up dangling images
            docker image prune -f

            echo "✅ Deployment complete: $IMAGE_TAG"
