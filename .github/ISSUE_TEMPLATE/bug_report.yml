name: Bug Report
description: Report a bug in Mintlens SDK or platform
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SDK TypeScript (@mintlens/sdk)
        - SDK Python (mintlens)
        - API (backend)
        - Dashboard (frontend)
        - Docker / self-hosting
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code to reproduce the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "e.g. @mintlens/sdk@0.1.0"

  - type: input
    id: node-version
    attributes:
      label: Node.js / Python version
      placeholder: "e.g. Node 22.1.0 / Python 3.12"
