###############################################################
# Mintlens — Production Docker Compose (Hetzner CX33 VPS)
# Usage: docker compose -f docker-compose.prod.yml up -d
###############################################################
version: "3.9"

name: mintlens-prod

networks:
  mintlens_net:
    driver: bridge
    internal: true   # No direct internet access for internal services
  nginx_net:
    driver: bridge   # Only Nginx is exposed

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  letsencrypt:
    driver: local

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mintlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mintlens
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mintlens_net
    # Not exposed to host — internal access only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d mintlens"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mintlens_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - mintlens_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Fastify) ───────────────────────────────────────────
  api:
    image: ghcr.io/mintlens/mintlens/api:${IMAGE_TAG:-latest}
    container_name: mintlens_api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mintlens_net
      - nginx_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── BullMQ Worker ───────────────────────────────────────────
  worker:
    image: ghcr.io/mintlens/mintlens/api:${IMAGE_TAG:-latest}
    container_name: mintlens_worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mintlens_net

  # ── Next.js Dashboard ───────────────────────────────────────
  web:
    image: ghcr.io/mintlens/mintlens/web:${IMAGE_TAG:-latest}
    container_name: mintlens_web
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    networks:
      - mintlens_net
      - nginx_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mintlens_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - nginx_net
    depends_on:
      - api
      - web
