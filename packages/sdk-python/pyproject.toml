[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mintlens"
version = "0.1.0"
description = "Official Python SDK for Mintlens — LLM cost tracking & governance"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Mintlens", email = "hello@mintlens.io" }]
keywords = ["llm", "ai", "cost-tracking", "openai", "anthropic", "observability", "finops"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.30.0"]
all = ["openai>=1.0.0", "anthropic>=0.30.0"]

[project.urls]
Homepage = "https://mintlens.io"
Documentation = "https://docs.mintlens.io/sdk/python"
Repository = "https://github.com/mintlens/mintlens"
"Bug Tracker" = "https://github.com/mintlens/mintlens/issues"
Changelog = "https://github.com/mintlens/mintlens/blob/main/packages/sdk-python/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["mintlens"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
